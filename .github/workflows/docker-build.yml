name: Build Push Deploy

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
    	with:
      	  username: ${{ secrets.DOCKER_USERNAME }}
      	  password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
    	run: |
      	  docker build -t siddu009/ai-job-assistant-backend:latest ./backend

      - name: Push Backend
    	run: |
      	  docker push siddu009/ai-job-assistant-backend:latest

      - name: Build Frontend
    	run: |
      	  docker build -t siddu009/ai-job-assistant-frontend:latest ./frontend

      - name: Push Frontend
    	run: |
      	  docker push siddu009/ai-job-assistant-frontend:latest

  deploy:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
    	uses: appleboy/ssh-action@v1.0.3
    	with:
      	  host: ${{ secrets.EC2_HOST }}
      	  username: ${{ secrets.EC2_USER }}
      	  key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd ~/Ai-job-assistant

          git pull

          docker compose pull

          docker compose down

          docker compose up -d
