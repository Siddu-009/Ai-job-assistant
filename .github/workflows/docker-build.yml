name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t siddu009/ai-job-assistant-backend:latest ./backend

      - name: Push Backend
        run: |
          docker push siddu009/ai-job-assistant-backend:latest

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend
        run: |
          docker build -t siddu009/ai-job-assistant-frontend:latest ./frontend

      - name: Push Frontend
        run: |
          docker push siddu009/ai-job-assistant-frontend:latest
